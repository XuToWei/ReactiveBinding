name: Publish NuGet

# Publishes XuToWei.ReactiveBinding to nuget.org when a version tag (e.g. v1.2.3) is pushed.
# The package version is taken from the tag name (the leading "v" is stripped).
#
# Auth: nuget.org Trusted Publishing (OIDC) — no stored API key.
# Prerequisites:
#   1. On nuget.org, create a Trusted Publishing policy for this package owner, pointing at
#      repo XuToWei/ReactiveBinding and workflow .github/workflows/publish-nuget.yml.
#   2. Add a repository Variable (Settings -> Secrets and variables -> Actions -> Variables)
#      named NUGET_USER = your nuget.org account username.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish (e.g. 1.2.3)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC / Trusted Publishing
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        run: dotnet test "NuGet/ReactiveBinding.Tests/ReactiveBinding.Generator.Tests.csproj" -c Release

      - name: Pack
        run: >
          dotnet pack "NuGet/ReactiveBinding.Package/ReactiveBinding.Package.csproj"
          -c Release
          -p:Version=${{ steps.ver.outputs.version }}
          -o artifacts

      - name: NuGet login (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to nuget.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

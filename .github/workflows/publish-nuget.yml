name: Publish NuGet

# Publishes XuToWei.ReactiveBinding to nuget.org when a version tag (e.g. v1.2.3) is pushed.
# The package version is taken from the tag name (the leading "v" is stripped).
# Requires repository secret: NUGET_API_KEY (nuget.org API key, push scope).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish (e.g. 1.2.3)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: >
          dotnet pack "NuGet/ReactiveBinding.Package/ReactiveBinding.Package.csproj"
          -c Release
          -p:Version=${{ steps.ver.outputs.version }}
          -o artifacts

      - name: Push to nuget.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
